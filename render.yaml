# Render Blueprint — deploy Kira Cloud in one click:
# Render dashboard -> New -> Blueprint -> select this repo -> Apply.
#
# Tokens are auto-generated by Render (Environment tab shows their values;
# put them into the console env / agent_config on your machines).
# ANTHROPIC_API_KEY is left unset until you're ready to enable AI coding.

services:
  - type: web
    name: kira-cloud
    runtime: python
    plan: free                 # free tier sleeps after idle + storage resets on
                               # deploy — fine for trials. For real use: plan
                               # starter + uncomment the disk block below.
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: KIRA_FIRM_TOKEN
        generateValue: true
      - key: KIRA_AGENT_TOKEN
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false            # set later in the dashboard to enable AI coding
    # --- persistent storage (requires a paid plan) ---
    # disk:
    #   name: kira-data
    #   mountPath: /var/data
    #   sizeGB: 1
